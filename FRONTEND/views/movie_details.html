<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <title>Cinexus - Movie Details</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/style/style.css" />
</head>
<body class="page-movie-details">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand nav-link" onclick="window.location.href='home.html'">🎬 Cinexus</span>
    <div class="navbar-user-group">
        <div id="navAvatar" class="avatar nav-avatar is-clickable" onclick="window.location.href='user_profile.html'" title="View profile">JD</div>
        <button class="btn btn-outline-light" onclick="cerrarSesion()">Logout</button>
    </div>
</nav>

<div class="container py-5">

    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <img id="poster" src="" alt="poster" class="poster">
        </div>
        <div class="col-md-9">
            <h1 id="titulo" class="text-white"></h1>
            <p class="text-secondary" id="meta"></p>
            <p class="text-white-50" id="descripcion"></p>

            <!-- Trailer placeholder - conectar con backend -->
            <div class="trailer-wrapper mt-3">
                <div class="ratio ratio-16x9">
                    <iframe
                        id="trailerFrame"
                        referrerpolicy="strict-origin-when-cross-origin"
                        src=""
                        title="Trailer"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
                <small id="trailerMessage" class="text-secondary d-block mt-2"></small>
            </div>

            <div class="d-flex align-items-center gap-2 mt-3">
                <select id="selectLista" class="form-select w-auto">
                    <option value="">Add to list...</option>
                    <option value="clasicos">My Favorite Classics</option>
                    <option value="nolan">Nolan Collection</option>
                    <option value="scifi">Must Watch Sci-Fi</option>
                </select>
                <button class="btn btn-morado" onclick="agregarALista()">+ Add</button>
            </div>
            <small id="mensajeLista" class="text-success mt-1 d-block"></small>
        </div>
    </div>

    <div class="caja-oscura p-4 mb-5">
        <h4 class="text-white mb-3">Write a Review</h4>
        <div id="selectorEstrellas" class="mb-2">
            <span class="estrella-btn" data-v="1">&#9733;</span>
            <span class="estrella-btn" data-v="2">&#9733;</span>
            <span class="estrella-btn" data-v="3">&#9733;</span>
            <span class="estrella-btn" data-v="4">&#9733;</span>
            <span class="estrella-btn" data-v="5">&#9733;</span>
        </div>
        <textarea id="textoResena" class="form-control mb-3" rows="3" placeholder="Share your thoughts..."></textarea>
        <button class="btn btn-morado" onclick="publicarResena()">Post</button>
    </div>

    <h4 class="text-white mb-3">Reviews</h4>
    <div id="contenedorResenas"></div>

</div>

<footer class="text-center py-3"><small>&copy; 2026 Cinexus - All rights reserved</small></footer>

<script src="../controllers/api.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem('user'));
if (!usuario) window.location.href = 'login-register.html';

function getInitials(name) {
    return (name || '')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0].toUpperCase())
        .join('') || 'JD';
}

document.getElementById('navAvatar').textContent = getInitials(usuario.name);

const tmdbId = new URLSearchParams(location.search).get('tmdbId');
let tituloPelicula = '';

// Hardcoded reviews
const resenas = {
    "Project Hail Mary": [
        { usuario: "Carlos", estrellas: 5, texto: "My girlfriend and I watched it and we both cried, don't miss it.", fecha: "3/1/2025" },
        { usuario: "Maria",  estrellas: 4, texto: "Amazing, though the ending left me with questions.", fecha: "5/1/2025" }
    ],
    "Zootopia 2": [
        { usuario: "Maria",  estrellas: 3, texto: "The first one was better but we still laughed a lot.", fecha: "20/4/2025" }
    ],
    "The Dark Knight": [
        { usuario: "Luis",   estrellas: 5, texto: "Put it on as background during dinner with my girlfriend and we ended up watching the whole thing.", fecha: "11/3/2024" },
        { usuario: "Carlos", estrellas: 5, texto: "The Joker really gets on my nerves, which means the acting was incredible.", fecha: "12/3/2024" }
    ],
    "The Shawshank Redemption": [
        { usuario: "Luis",   estrellas: 5, texto: "My girlfriend and I watched it on a Sunday and didn't say a word for two hours, it was that good.", fecha: "11/3/2024" }
    ]
};

function formatMovieMeta(movie) {
    const parts = [];
    if (movie.genres && movie.genres.length) parts.push(movie.genres.join(', '));
    if (movie.year) parts.push(movie.year);
    if (movie.rated) parts.push(movie.rated);
    if (movie.runtime) parts.push(`${movie.runtime} min`);
    return parts.join(' | ');
}

function loadMovieDetails() {
    if (!tmdbId) {
        document.getElementById('titulo').textContent = 'Movie not found';
        document.getElementById('descripcion').textContent = 'Missing tmdbId in URL.';
        return;
    }

    ajax('GET', `/movies/tmdb/${encodeURIComponent(tmdbId)}`, null, function (movie, status) {
        if (status !== 200) {
            document.getElementById('titulo').textContent = 'Movie not found';
            document.getElementById('descripcion').textContent = 'Could not load movie details.';
            return;
        }

        tituloPelicula = movie.title || 'Unknown movie';
        document.getElementById('titulo').textContent = tituloPelicula;
        document.getElementById('meta').textContent = formatMovieMeta(movie);
        document.getElementById('descripcion').textContent = movie.plot || 'No description available.';
        document.getElementById('poster').src = movie.poster || 'https://www.juliedray.com/wp-content/uploads/2022/01/sans-affiche.png';
        document.getElementById('poster').alt = tituloPelicula;

        const trailerFrame = document.getElementById('trailerFrame');
        const trailerMessage = document.getElementById('trailerMessage');
        if (movie.trailer && movie.trailer.url) {
            trailerFrame.src = movie.trailer.url;
            trailerMessage.textContent = movie.trailer.title ? `Trailer: ${movie.trailer.title}` : '';
        } else {
            trailerFrame.removeAttribute('src');
            trailerMessage.textContent = 'Trailer not available right now.';
        }

        mostrarResenas();
    });
}

// Star selector
let estrellasSeleccionadas = 0;

document.querySelectorAll('.estrella-btn').forEach(s => {
    s.addEventListener('mouseover', () => resaltarEstrellas(+s.dataset.v));
    s.addEventListener('mouseout',  () => resaltarEstrellas(estrellasSeleccionadas));
    s.addEventListener('click',     () => { estrellasSeleccionadas = +s.dataset.v; resaltarEstrellas(estrellasSeleccionadas); });
});

function resaltarEstrellas(n) {
    document.querySelectorAll('.estrella-btn').forEach(s => s.classList.toggle('activa', +s.dataset.v <= n));
}

function publicarResena() {
    const texto = document.getElementById('textoResena').value.trim();
    if (!tituloPelicula) { alert('Movie details are still loading.'); return; }
    if (!estrellasSeleccionadas || !texto) { alert('Select a rating and write a review.'); return; }
    if (!resenas[tituloPelicula]) resenas[tituloPelicula] = [];
    resenas[tituloPelicula].unshift({ usuario: usuario.name, estrellas: estrellasSeleccionadas, texto, fecha: new Date().toLocaleDateString() });
    document.getElementById('textoResena').value = '';
    estrellasSeleccionadas = 0;
    resaltarEstrellas(0);
    mostrarResenas();
}

function mostrarResenas() {
    const lista = resenas[tituloPelicula] || [];
    const contenedor = document.getElementById('contenedorResenas');
    if (!lista.length) { contenedor.innerHTML = '<p class="text-secondary">No reviews yet.</p>'; return; }
    contenedor.innerHTML = lista.map(r => `
        <div class="tarjeta-resena">
            <div class="d-flex justify-content-between">
                <strong class="text-white">${r.usuario}</strong>
                <small class="text-secondary">${r.fecha}</small>
            </div>
            <div class="estrellas">${'★'.repeat(r.estrellas)}${'☆'.repeat(5 - r.estrellas)}</div>
            <p class="text-white-50 mb-0 mt-1">${r.texto}</p>
        </div>
    `).join('');
}

function agregarALista() {
    const select = document.getElementById('selectLista');
    if (!select.value || !tituloPelicula) return;
    document.getElementById('mensajeLista').textContent = '"' + tituloPelicula + '" added to "' + select.selectedOptions[0].text + '"';
    setTimeout(() => document.getElementById('mensajeLista').textContent = '', 3000);
}

function cerrarSesion() { localStorage.removeItem('user'); window.location.href = 'login-register.html'; }

loadMovieDetails();
</script>
</body>
</html>
