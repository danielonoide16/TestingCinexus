<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <title>Cinexus - Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/style/style.css" />
</head>
<body class="page-home">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand home-link" onclick="goToHome()">🎬 Cinexus</span>
    <div class="navbar-user-group">
        <div id="navAvatar" class="avatar nav-avatar is-clickable" onclick="goToProfile()" title="View profile">JD</div>
        <button class="btn btn-outline-light" onclick="logout()">Logout</button>
    </div>
</nav>

<section class="hero text-white">
    <h1>Discover and Review Movies</h1>
    <p>Millions of movies, millions of reviews</p>

    <div class="d-flex justify-content-center mt-3">
        <input id="searchInput" type="text" class="form-control w-50 me-2" placeholder="Search movie...">
        <button class="btn btn-purple" onclick="renderMovies()">Search</button>
    </div>
</section>

<div class="container mt-5">

    <div class="d-flex align-items-center gap-2 mb-4">
        <span aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="M6.5 10.793V14l3-1.5v-1.707L14.146 5.5A.5.5 0 0 0 14 4.793V3.5A.5.5 0 0 0 13.5 3h-11a.5.5 0 0 0-.5.5v1.293a.5.5 0 0 0-.146.707l4.646 5.293z"/>
            </svg>
        </span>
        <p class="mb-0">Filters</p>
    </div>
    <!-- FILTROS -->
    <div class="d-flex gap-3 mb-4 flex-wrap">
        <select id="genreFilter" class="form-select w-auto" onchange="renderMovies()">
            <option value="">All Genres</option>
            <option value="Action">Action</option>
            <option value="Adventure">Adventure</option>
            <option value="Animation">Animation</option>
            <option value="Comedy">Comedy</option>
            <option value="Crime">Crime</option>
            <option value="Drama">Drama</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Horror">Horror</option>
            <option value="Romance">Romance</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Thriller">Thriller</option>
        </select>

        <select id="typeFilter" class="form-select w-auto" onchange="renderMovies()">
            <option value="">All types</option>
            <option value="movie">Movie</option>
            <option value="series">Series</option>
            <option value="episode">Episode</option>
        </select>

        <select id="ratedFilter" class="form-select w-auto" onchange="renderMovies()">
            <option value="">All ratings</option>
            <option value="G">G</option>
            <option value="PG">PG</option>
            <option value="PG-13">PG-13</option>
            <option value="R">R</option>
            <option value="NC-17">NC-17</option>
            <option value="TV-14">TV-14</option>
            <option value="TV-MA">TV-MA</option>
        </select>

        <input id="languageFilter" type="text" class="form-control w-auto" placeholder="Language" onchange="renderMovies()">
        <input id="countryFilter" type="text" class="form-control w-auto" placeholder="Country" onchange="renderMovies()">
        <input id="fromYearFilter" type="number" min="1888" max="2100" class="form-control w-auto" placeholder="From year" onchange="renderMovies()">
        <input id="toYearFilter" type="number" min="1888" max="2100" class="form-control w-auto" placeholder="To year" onchange="renderMovies()">
        <input id="minRuntimeFilter" type="number" min="1" max="500" class="form-control w-auto" placeholder="Min runtime" onchange="renderMovies()">
        <input id="maxRuntimeFilter" type="number" min="1" max="500" class="form-control w-auto" placeholder="Max runtime" onchange="renderMovies()">

        <select id="sortFilter" class="form-select w-auto" onchange="renderMovies()">
            <option value="year_desc">Newest first</option>
            <option value="year_asc">Oldest first</option>
            <option value="title_asc">Title A-Z</option>
            <option value="title_desc">Title Z-A</option>
            <option value="rating_desc">IMDb rating high-low</option>
            <option value="rating_asc">IMDb rating low-high</option>
            <option value="runtime_desc">Runtime long-short</option>
            <option value="runtime_asc">Runtime short-long</option>
        </select>
    </div>

    <h3 class="mb-4">Recent Movies</h3>

    <div id="moviesContainer" class="row g-4"></div>

</div>

<script src="../controllers/api.js"></script>
<script>
requireAuth();
const user = JSON.parse(localStorage.getItem('user')) || {};
document.getElementById('navAvatar').textContent = getInitials(user.name);


function loadImage(url) {
    return new Promise(resolve => {
        const img = new Image();

        img.onload = () => {
            resolve(true);  
        };

        img.onerror = () => resolve(false);

        img.src = url;
    });
}

async function filterValidImages(movies) {
    const checks = await Promise.all(
        movies.map(async m => {
            if (!m.poster) return null;

            const isValid = await loadImage(m.poster);
            return isValid ? m : null;
        })
    );

    return checks.filter(Boolean);
}

async function renderMovies() {
    const search = document.getElementById('searchInput').value.trim();
    const genre = document.getElementById('genreFilter').value;
    const type = document.getElementById('typeFilter').value;
    const rated = document.getElementById('ratedFilter').value;
    const language = document.getElementById('languageFilter').value.trim();
    const country = document.getElementById('countryFilter').value.trim();
    const fromYear = document.getElementById('fromYearFilter').value.trim();
    const toYear = document.getElementById('toYearFilter').value.trim();
    const minRuntime = document.getElementById('minRuntimeFilter').value.trim();
    const maxRuntime = document.getElementById('maxRuntimeFilter').value.trim();
    const sort = document.getElementById('sortFilter').value;

    let url = '/movies?';

    if (search) url += `q=${encodeURIComponent(search)}&`;
    if (genre) url += `genre=${encodeURIComponent(genre)}&`;
    if (type) url += `type=${encodeURIComponent(type)}&`;
    if (rated) url += `rated=${encodeURIComponent(rated)}&`;
    if (language) url += `language=${encodeURIComponent(language)}&`;
    if (country) url += `country=${encodeURIComponent(country)}&`;
    if (fromYear) url += `fromYear=${encodeURIComponent(fromYear)}&`;
    if (toYear) url += `toYear=${encodeURIComponent(toYear)}&`;
    if (minRuntime) url += `minRuntime=${encodeURIComponent(minRuntime)}&`;
    if (maxRuntime) url += `maxRuntime=${encodeURIComponent(maxRuntime)}&`;
    if (sort) url += `sort=${encodeURIComponent(sort)}&`;

    if (!search && !genre && !type && !rated && !language && !country && !fromYear && !toYear && !minRuntime && !maxRuntime && sort === 'year_desc') {
        url = '/movies/recent';
    }

    ajax('GET', url, null, async function (data, status) {
        const container = document.getElementById('moviesContainer');
        container.innerHTML = '';

        if (status !== 200) {
            container.innerHTML = "<p class='text-white'>Error loading movies</p>";
            return;
        }

        if (!data.length) {
            container.innerHTML = "<p class='text-white'>No results</p>";
            return;
        }

        const validMovies = await filterValidImages(data);

        validMovies.forEach(m => {
            const posterUrl = m.poster || 'https://www.juliedray.com/wp-content/uploads/2022/01/sans-affiche.png';

            container.innerHTML += `
            <div class="col-md-3">
                <div class="movie-card" onclick="goToMovie('${m.imdbID}')">
                    <img src="${posterUrl}" class="w-100">
                    <div class="p-2 text-white">
                        <strong>${m.title}</strong><br>
                        <small>${m.year || ''}${m.rated ? ` • ${m.rated}` : ''}${m.runtime ? ` • ${m.runtime} min` : ''}</small>
                    </div>
                </div>
            </div>
            `;
        });
    });
}

function goToMovie(imdbID) {
    window.location.href = 'movie_details.html?imdbID=' + imdbID;
}


// INIT
renderMovies();
function goToProfile(){
    window.location.href = 'user_profile.html';
}

function goToHome(){
    window.location.href = 'home.html';
}

</script>

</body>
<footer class="text-center py-3">
    <small>&copy; 2026 Cinexus - All rights reserved</small>
</footer>
</html>
